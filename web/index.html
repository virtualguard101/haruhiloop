<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haruhi Loop · 无尽八月循环模拟器</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231e1e2e'/%3E%3Ctext x='16' y='22' font-size='20' text-anchor='middle' fill='%23bd93f9' font-family='monospace'%3E∞%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
    <link rel="stylesheet" href="/src/styles/terminal.css" />
  </head>
  <body>
    <div id="app">
      <div id="terminal"></div>
      <div id="hud">
        <!-- hud-clock / hud-mode 由 main.ts 通过 getElementById 取引用，
             保留 DOM 节点（CSS 隐藏不显示），避免改 ts 端的强制断言。
             实际 mode / clock 已经由 textual 的 Header 渲染在终端里。 -->
        <span id="hud-clock" hidden></span>
        <span id="hud-mode" hidden></span>
        <span id="hud-tip">请将浏览器高度调至最高，并留适当宽度以确保显示效果</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
